      <p>ユリーカの言葉の意味を知らなかったので調べると「我、発見せり」という意味であり
アルキメデスが浮力の原理を発見した時に叫んだ言葉として有名らしく、
問題解決やヒラメキの喜びを表す言葉として使われるらしい。</p>
      <p>エウレカ<br>
エウレーカ<br>
ユリイカ<br>
ユリーカ</p>
      <p>発音というかカタカナで書かれているのを見るといくつか呼び方がある。僕はスキマスイッチの「ユリーカ」がキッカケなので、ユリーカと言う。</p>
